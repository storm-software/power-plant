  - conventional-changelog-storm-software
  - "@stryke/*"
  - "@powerlines/*"
  - prettier
allowBuilds:
  "@parcel/watcher": true
  "@swc/core": true
  core-js: true
  esbuild: true
  lefthook: true
  nx: true
  unrs-resolver: true
supportedArchitectures:
  cpu:
    - current
    - wasm32
